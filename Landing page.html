<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Digital Lab</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #eaeaea;
            --accent-color: #00ffaa; /* Cyber green */
            --muted-color: #888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle grid background */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 170, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 170, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
            max-width: 400px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--accent-color);
            font-family: monospace;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .bio {
            color: var(--muted-color);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(0, 255, 170, 0.08);
            border-color: var(--accent-color);
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <!-- Temporary placeholder avatar, change to your own later! -->
        <img class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=robotlee" alt="Robot Avatar">
        
        <h1>robotlee10</h1>
        <div class="subtitle">BUILDING IN THE MATRIX //</div>
        
        <p class="bio">
            Welcome to my digital lab. I'm exploring code, web projects, and automating things. This domain is my testing ground.
        </p>

        <div class="links">
            <!-- Swap these links out with your actual profiles -->
            <a href="https://github.com" target="_blank" class="btn">💻 GitHub Profile</a>
            <a href="#" class="btn">⚡ Project Sandbox</a>
            <a href="#" class="btn">☕ Say Hello</a>
        </div>
    </div>

</body>
</html>
