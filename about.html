<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // About</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        /* Profile Layout Styling */
        .profile-pic {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .bio-text {
            line-height: 1.8;
            color: #888888;
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/services.html">Services</a>
        <a href="/about.html" class="active">About</a>
        <a href="/contact.html">Contact</a>
    </nav>

    <div class="container" id="profile-container">
        </div>

    <script>
        const container = document.getElementById('profile-container');

        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        try {
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            async function loadAbout() {
                let { data: profile, error } = await supabase
                    .from('about')
                    .select('*');

                if (error || !profile || profile.length === 0) {
                    return; 
                }

                // Extract the first row from our table
                const data = profile[0];

                const imageHtml = data.image_url 
                    ? `<img src="${data.image_url}" class="profile-pic" alt="Profile">` 
                    : '';

                container.innerHTML = `
                    ${imageHtml}
                    <h1>${data.title}</h1>
                    <p class="bio-text">${data.bio}</p>
                `;
            }

            loadAbout();

        } catch (err) {
            // Quiet fail
        }
    </script>
</body>
</html>
