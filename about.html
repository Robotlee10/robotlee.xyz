    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),

        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Profile Block */
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
            margin-bottom: 20px;
        }

        h1, h2 {
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 { font-size: 28px; margin-bottom: 10px; }
        h2 { font-size: 18px; border-bottom: 1px solid #222; padding-bottom: 8px; margin-top: 40px; }

        .bio-text {
            line-height: 1.8;
            color: #888888;
            font-size: 16px;
            max-width: 550px;
            margin: 0 auto;

        /* Skills Pill Layout */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .skill-badge {
            background-color: #111;
            border: 1px solid #222;
            color: #00ff88;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-family: monospace;
        }

        /* Timeline Split Columns */
        .timeline-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .timeline-columns { grid-template-columns: 1fr; }
        }

        .timeline-card {
            background-color: #111111;
            border-left: 2px solid #00ff88;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 15px;
        }

        .timeline-card .year {
            color: #00ff88;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .timeline-card .title {
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
        }

        .timeline-card .inst {
            color: #666666;
            font-size: 13px;
            margin-top: 2px;
        }

        /* Social Icons Wrapper at bottom */
        .icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .social-icon-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 55px;
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 50%;
            font-size: 22px;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-icon-btn:hover {
            transform: scale(1.15);
        }

        /* --- CLIENT INTAKE PORTAL FORM STYLING --- */
        .contact-portal {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 30px 25px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .contact-portal h2 {
            border-bottom: none;
            padding-bottom: 0;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .contact-portal p {
            font-size: 14px;
            color: #666666;
            margin: 0 0 20px 0;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-family: monospace;
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 4px;
            padding: 12px;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #00ff88;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            background-color: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
        }

        #form-status {
            font-family: monospace;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>

    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';

    const name = platformName ? String(platformName).toLowerCase().trim() : '';

    if (name.includes('github')) {
        return `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>`;
    }
    // LinkedIn SVG
    if (name.includes('linkedin')) {
        return `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;

        async function loadAllAboutData() {
    try {
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 1. Fetch Profile Row safely
        try {
            const aboutRes = await supabase.from('about').select('*');
            const profileContainer = document.getElementById('profile-container');
            if (aboutRes.data && aboutRes.data.length > 0) {
                const profile = aboutRes.data[0];
                profileContainer.innerHTML = `
                    ${profile.image_url ? `<img src="${profile.image_url}" class="profile-pic" alt="Profile">` : ''}
                    <h1>${profile.title || 'robotlee10'}</h1>
                    <p class="bio-text">${profile.bio || ''}</p>
                `;
            } else {
                profileContainer.innerHTML = `<h1>robotlee10</h1><p class="bio-text">Developer Profile Matrix</p>`;
            }
        } catch (e) { console.error("Profile error:", e); }

        // 2. Fetch Skills Grid safely
        try {
            const skillsRes = await supabase.from('skills').select('*');
            const skillsContainer = document.getElementById('skills-container');
            if (skillsRes.data && skillsRes.data.length > 0) {
                skillsContainer.innerHTML = skillsRes.data.map(skill => `
                    <div class="skill-badge">${skill.name || ''}</div>
                `).join('');
            }
        } catch (e) { console.error("Skills error:", e); }

        // 3. Fetch History Timeline Matrix safely
        try {
            const timelineRes = await supabase.from('timeline').select('*');
            if (timelineRes.data && timelineRes.data.length > 0) {
                const eduContainer = document.getElementById('education-container');
                const expContainer = document.getElementById('experience-container');

                const eduHtml = timelineRes.data
                    .filter(item => item && item.type === 'Education')
                    .map(item => `
                        <div class="timeline-card">
                            <div class="year">${item.year || ''}</div>
                            <div class="title">${item.title || ''}</div>
                            <div class="inst">${item.institution || ''}</div>
                        </div>
                    `).join('');

                const expHtml = timelineRes.data
                    .filter(item => item && item.type === 'Experience')
                    .map(item => `
                        <div class="timeline-card">
                            <div class="year">${item.year || ''}</div>
                            <div class="title">${item.title || ''}</div>
                            <div class="inst">${item.institution || ''}</div>
                        </div>
                    `).join('');

                if (eduContainer) eduContainer.innerHTML = eduHtml || '<div style="color:#555;font-size:14px;">No educational logs.</div>';
                if (expContainer) expContainer.innerHTML = expHtml || '<div style="color:#555;font-size:14px;">No experience logs.</div>';
            }
        } catch (e) { console.error("Timeline error:", e); }

        // 4. Fetch Social Network Channels safely
        try {
            const socialsRes = await supabase.from('socials').select('*');
            const socialsContainer = document.getElementById('socials-container');
            
            if (!socialsRes.data || socialsRes.data.length === 0) {
                console.warn("Supabase returned NO data for 'socials' table.");
                if (socialsContainer) socialsContainer.innerHTML = '<span style="color:#555;">No social links found.</span>';
            } else if (socialsContainer) {
                socialsContainer.innerHTML = socialsRes.data.map(item => {
                    if (!item) return '';
                    const accentColor = item.color || '#00ff88';
                    const svgIcon = getIconSVG(item.platform);
return `
    <a href="${item.url || '#'}" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="social-icon-btn"
       title="${item.platform || ''}"
       onmouseenter="this.style.borderColor='${accentColor}'; this.style.color='${accentColor}'; this.style.boxShadow='0 0 20px ${accentColor}44';"
       onmouseleave="this.style.borderColor='#222222'; this.style.color='#ffffff'; this.style.boxShadow='none';">
       ${svgIcon}
    </a>
`;
                }).join('');
            }
        } catch (e) { console.error("Socials section error:", e); }

        // 5. Wire up Form Handler
        setupFormListener(supabase);

    } catch (err) {
        console.error("Initialization error containment invoked:", err);
    }
}
     function setupFormListener(supabaseInstance) {
            const contactForm = document.getElementById('intake-form');
            if (!contactForm) return;

            contactForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const emailInput = document.getElementById('client-email').value;
                const messageInput = document.getElementById('client-message').value;
                const statusDiv = document.getElementById('form-status');
                
                if (!statusDiv) return;

                statusDiv.style.display = 'block';
                statusDiv.style.color = '#888888';
                statusDiv.innerText = 'TRANSMITTING SIGNAL...';

                try {
                    // Changed 'inquiries' to 'enquiries' to match your Supabase table perfectly
                    const { error } = await supabaseInstance
                        .from('enquiries')
                        .insert([{ email: emailInput, message: messageInput }]);

                    if (error) throw error;

                    statusDiv.style.color = '#00ff88';
                    statusDiv.innerText = 'SIGNAL RECEIVED SUCCESSFULLY.';
                    contactForm.reset();
                } catch (err) {
                    statusDiv.style.color = '#ff3333';
                    statusDiv.innerText = 'TRANSMISSION FAILED. CORRUPTED PACKET.';
                    console.error(err);
                }
            });
        }

        // Execute layout generation on window load state
        window.addEventListener('DOMContentLoaded', loadAllAboutData);
    </script>
