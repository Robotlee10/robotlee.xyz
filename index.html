    <script>

        async function loadHomePage() {
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                // Fetch up to 5 updates from your home table, newest rows first
                let { data: homeRows } = await supabase
                    .from('home')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                const swiperContainer = document.getElementById('text-swiper');

                if (homeRows && homeRows.length > 0) {
                    let swiperHtml = '';

                    // Generate a swipe block for every single row item
                    homeRows.forEach(row => {
                        swiperHtml += `
                            <div class="swiper-slide">
                                <div class="headline-text">${row.headline || ''}</div>
                                <p class="subheadline-text">${row.subheadline || ''}</p>
                            </div>
                        `;
                    });

                    swiperContainer.innerHTML = swiperHtml;
                } else {
                    // Fallback visual content if table has 0 rows configured
                    swiperContainer.innerHTML = `
                        <div class="swiper-slide">
                            <div class="headline-text">Engineering Custom Digital Solutions.</div>
                            <p class="subheadline-text">Welcome to my digital outpost. I build clean, high-performance web spaces and test automation systems.</p>
                        </div>
                    `;
                }
            } catch (err) {}
        }

        loadHomePage();
