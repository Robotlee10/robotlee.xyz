<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .logo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.25);
            margin: 0 auto 30px auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #ffffff;
            font-size: 38px;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .status-tag {
            color: #00ff88;
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .bio-text {
            line-height: 1.8;
            color: #888888;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .section-title {
            text-align: left;
            color: #ffffff;
            font-size: 18px;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            font-weight: normal;
        }

        /* --- SIDE SCROLLING CAROUSEL ENGINE --- */
        .scroll-wrapper {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 15px;
            text-align: left;
            scrollbar-width: thin;
            scrollbar-color: #222 transparent;
        }

        /* Webkit layout customization for scrollbars */
        .scroll-wrapper::-webkit-scrollbar {
            height: 6px;
        }
        .scroll-wrapper::-webkit-scrollbar-thumb {
            background-color: #222;
            border-radius: 10px;
        }
        .scroll-wrapper::-webkit-scrollbar-thumb:hover {
            background-color: #00ff88;
        }

        .status-card {
            flex: 0 0 280px; /* Forces cards to stay side-by-side without shrinking */
            scroll-snap-align: start;
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .status-card:hover {
            border-color: #00ff88;
        }

        .card-date {
            font-family: monospace;
            font-size: 11px;
            color: #00ff88;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .status-card p {
            color: #888888;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">Home</a>
        <a href="/services.html">Services</a>
        <a href="/about.html">About</a>
    </nav>

    <div class="container">
        <div class="logo-frame">
            <img src="https://yrpfevxzocpedpthknhi.supabase.co/storage/v1/object/public/robotlee10.dpdns.org/eb1090c3-fbfc-4c85-ad03-229fd22d2f23.jpg" class="brand-logo" alt="Logo">
        </div>
        
        <h1 id="hero-title">robotlee10</h1>
        <div class="status-tag">SYSTEM // ONLINE</div>

        <p class="bio-text" id="hero-subtitle">...</p>

        <h2 class="section-title">Log History</h2>
        <div class="scroll-wrapper" id="status-container">
            <div class="status-card">
                <p style="color: #444;">Loading database packets...</p>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        async function loadHomePage() {
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                // Fetch up to 10 rows from 'home' table, newest first
                let { data: homeRows, error } = await supabase
                    .from('home')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);

                const container = document.getElementById('status-container');

                if (homeRows && homeRows.length > 0) {
                    // 1. Set your main bio paragraph using the newest row's subheadline
                    document.getElementById('hero-subtitle').innerText = homeRows[0].subheadline || '';

                    // 2. Loop over every row inside the array to build horizontal cards dynamically
                    let scrollHtml = '';
                    homeRows.forEach(row => {
                        // Format the timestamp nicely if available
                        let displayDate = 'LOG // UPDATE';
                        if (row.created_at) {
                            const dateObj = new Date(row.created_at);
                            displayDate = dateObj.toLocaleDateString('en-US', { 
                                month: 'short', 
                                day: 'numeric', 
                                year: 'numeric' 
                            });
                        }

                        scrollHtml += `
                            <div class="status-card">
                                <div class="card-date">● ${displayDate}</div>
                                <p>${row.headline || 'Empty logs.'}</p>
                            </div>
                        `;
                    });

                    container.innerHTML = scrollHtml;
                } else {
                    // Fallback visual layout if database row sets are completely empty
                    document.getElementById('hero-subtitle').innerText = "Welcome to my digital outpost. I build clean, high-performance web spaces and test automation systems.";
                    container.innerHTML = `
                        <div class="status-card">
                            <div class="card-date">● DEFAULT ACTIVE</div>
                            <p>Deploying multi-page core architecture via Vercel pipeline successfully.</p>
                        </div>
                    `;
                }
            } catch (err) {}
        }

        loadHomePage();
    </script>
</body>
</html>
