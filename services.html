<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="services-container" style="padding: 20px; font-family: sans-serif; font-size: 18px;">
        Connecting to database...
    </div>

    <script>
        const container = document.getElementById('services-container');

        // Replace these with your actual info
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        try {
            // Note: The global object inside this library version is window.supabase
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            async function loadServices() {
                let { data: services, error } = await supabase
                    .from('services')
                    .select('*');

                if (error) {
                    container.innerHTML = "❌ Database Error: " + error.message;
                    return;
                }

                if (!services || services.length === 0) {
                    container.innerHTML = "⚠️ Connected! But your services table is empty.";
                    return;
                }

                container.innerHTML = services.map(service => `
                    <div style="border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px;">
                        <h3>${service.title}</h3>
                        <p>${service.description}</p>
                    </div>
                `).join('');
            }

            loadServices();

        } catch (err) {
            container.innerHTML = "❌ JavaScript System Error: " + err.message;
        }
    </script>
</body>
</html>
